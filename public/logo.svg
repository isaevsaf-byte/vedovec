<svg viewBox="0 0 820 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V: thin diagonal strokes forming chevron with 2 horizontal white-gap bars -->
  <!-- Left diagonal: top-left to bottom-center -->
  <!-- Right diagonal: top-right to bottom-center -->
  <!-- Rendered as a filled shape with thin stroke aesthetic -->
  <g fill="none" stroke="#003399" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">

    <!-- V1: left leg (top-left to bottom-center) -->
    <line x1="8" y1="8" x2="58" y2="72"/>
    <!-- V1: right leg (top-right to bottom-center) -->
    <line x1="108" y1="8" x2="58" y2="72"/>
    <!-- V1: upper horizontal crossing bar -->
    <line x1="20" y1="28" x2="96" y2="28"/>
    <!-- V1: lower horizontal crossing bar -->
    <line x1="36" y1="50" x2="80" y2="50"/>

    <!-- E1: three horizontal bars -->
    <line x1="124" y1="8"  x2="208" y2="8"/>
    <line x1="124" y1="40" x2="208" y2="40"/>
    <line x1="124" y1="72" x2="208" y2="72"/>
    <!-- E1: vertical spine -->
    <line x1="124" y1="8"  x2="124" y2="72"/>

    <!-- D: half-oval outline — left spine + right arc -->
    <path d="M 228,8 L 228,72 Q 310,72 310,40 Q 310,8 228,8"/>

    <!-- O: rounded rectangle (stadium) outline -->
    <rect x="328" y="8" width="100" height="64" rx="32"/>

    <!-- V2: same geometry shifted right by 456 -->
    <line x1="464" y1="8" x2="514" y2="72"/>
    <line x1="564" y1="8" x2="514" y2="72"/>
    <line x1="476" y1="28" x2="552" y2="28"/>
    <line x1="492" y1="50" x2="536" y2="50"/>

    <!-- E2: three horizontal bars -->
    <line x1="580" y1="8"  x2="664" y2="8"/>
    <line x1="580" y1="40" x2="664" y2="40"/>
    <line x1="580" y1="72" x2="664" y2="72"/>
    <!-- E2: vertical spine -->
    <line x1="580" y1="8"  x2="580" y2="72"/>

    <!-- C: open arc (about 300 degrees, opening on right side) -->
    <path d="M 802,20 A 40,32 0 1 0 802,60" stroke-linecap="round"/>

  </g>
</svg>
