<svg viewBox="0 0 790 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g fill="#003399">

    <!-- V1: three chevron stripes (V with two horizontal white cuts) -->
    <!-- Top stripe  y=5→33,  left/right edges of V at those heights -->
    <polygon points="5,5 111,5 89.8,33 26.2,33"/>
    <!-- Middle stripe y=42→52 -->
    <polygon points="33,42 83,42 75.4,52 40.6,52"/>
    <!-- Bottom stripe y=61→75 (pointed) -->
    <polygon points="47.4,61 68.6,61 58,75"/>

    <!-- E1: three horizontal bars aligned with V stripe positions -->
    <rect x="125" y="5"  width="92" height="28"/>
    <rect x="125" y="42" width="92" height="10"/>
    <rect x="125" y="61" width="92" height="14"/>

    <!-- V2: same geometry, shifted right by 472 -->
    <polygon points="477,5 583,5 561.8,33 498.2,33"/>
    <polygon points="505,42 555,42 547.4,52 512.6,52"/>
    <polygon points="519.4,61 540.6,61 530,75"/>

    <!-- E2: same bar heights as E1 -->
    <rect x="597" y="5"  width="88" height="28"/>
    <rect x="597" y="42" width="88" height="10"/>
    <rect x="597" y="61" width="88" height="14"/>
  </g>

  <!-- D: outlined letter — stroke-center path traces the D ring -->
  <!-- outer bounds: x=229→333, y=5→75; stroke-center inset 6px each side -->
  <path d="M 235,11 L 235,69 C 289,69 327,56 327,40 C 327,24 289,11 235,11 Z"
    stroke="#003399" stroke-width="12" stroke-linejoin="round"/>

  <!-- O: rounded-pill outline (stadium shape, very rounded corners) -->
  <!-- outer bounds: x=347→463, y=5→75; stroke-center inset 6px -->
  <rect x="353" y="11" width="104" height="58" rx="29"
    stroke="#003399" stroke-width="12"/>

  <!-- C: 272° arc from upper-right opening to lower-right opening -->
  <!-- center (741,40), rx=36, ry=29 (stroke-center, outer inset 6px) -->
  <!-- sweep=0 = counter-clockwise on screen = goes left through the C body -->
  <path d="M 767,20 A 36,29 0 1 0 767,60"
    stroke="#003399" stroke-width="12" stroke-linecap="round"/>

</svg>
